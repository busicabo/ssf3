<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messenger</title>
  <link rel="stylesheet" href="/css/chat.css" />
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <h1>Messenger</h1>
          <p id="current-user">Загрузка профиля...</p>
        </div>
        <button id="refresh-btn" class="ghost-btn" title="Обновить">↻</button>
      </div>

      <section class="search-panel">
        <label for="user-search">Поиск пользователей</label>
        <div class="search-row">
          <input id="user-search" type="text" placeholder="Введите username" autocomplete="off" />
          <button id="search-btn">Найти</button>
        </div>
        <div id="search-results" class="search-results empty">Введите имя пользователя для поиска</div>
      </section>

      <section class="chat-list-panel">
        <div class="section-title-row">
          <h2>Чаты</h2>
          <span id="chat-count" class="badge">0</span>
        </div>
        <div id="chat-list" class="chat-list empty">Чаты не найдены</div>
      </section>
    </aside>

    <main class="chat-stage">
      <header class="chat-header">
        <div>
          <h2 id="chat-title">Выберите чат</h2>
          <p id="chat-subtitle">Сообщения появятся здесь</p>
        </div>
        <div id="connection-state" class="status-pill offline">offline</div>
      </header>

      <section id="message-list" class="message-list empty-state">
        <div class="empty-hint">
          <h3>Добро пожаловать</h3>
          <p>Выбери чат слева или найди пользователя.</p>
        </div>
      </section>

      <footer class="composer">
        <div id="composer-warning" class="composer-warning hidden"></div>
        <div class="composer-row">
          <textarea id="message-input" rows="1" placeholder="Введите сообщение" disabled></textarea>
          <button id="send-btn" disabled>Отправить</button>
        </div>
      </footer>
    </main>
  </div>

  <template id="chat-item-template">
    <button class="chat-item" type="button">
      <div class="chat-item-main">
        <div class="chat-item-title"></div>
        <div class="chat-item-preview"></div>
      </div>
      <div class="chat-item-meta">
        <span class="chat-item-time"></span>
      </div>
    </button>
  </template>

  <template id="user-result-template">
    <div class="user-result">
      <div>
        <div class="user-result-title"></div>
        <div class="user-result-subtitle"></div>
      </div>
      <button class="ghost-btn small-btn" type="button">Открыть</button>
    </div>
  </template>

  <template id="message-template">
    <article class="message-item">
      <div class="message-bubble">
        <div class="message-text"></div>
        <div class="message-meta"></div>
      </div>
    </article>
  </template>

  <script src="/js/chat.js"></script>
</body>
</html>
